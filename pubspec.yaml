name: Fulens
description: FuLens — Aplikasi Prediksi Harga Emas AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── HTTP & API ──
  http: ^1.2.1
  dio: ^5.4.3+1
  web_socket_channel: ^2.4.5   # realtime bot (WebSocket)

  # ── State Management ──
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # ── Chart ──
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^26.1.35   # candlestick live + Fibonacci

  # ── UI Components ──
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  badges: ^3.1.2

  # ── Storage ──
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Utils ──
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
